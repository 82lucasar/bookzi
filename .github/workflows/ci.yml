name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: "11.2.2"
      - name: Remove pnpm.yaml build restrictions (CI only)
        run: rm -f pnpm.yaml
      - name: Install dependencies
        run: pnpm install --reporter=default 2>&1
      - run: pnpm turbo typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: "11.2.2"
      - name: Remove pnpm.yaml build restrictions (CI only)
        run: rm -f pnpm.yaml
      - name: Install dependencies
        run: pnpm install --reporter=default 2>&1
      - run: pnpm turbo lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: "11.2.2"
      - name: Remove pnpm.yaml build restrictions (CI only)
        run: rm -f pnpm.yaml
      - name: Install dependencies
        run: pnpm install --reporter=default 2>&1
      - name: Run unit tests
        run: pnpm turbo test --filter=@bookzi/web

  sentry-release:
    name: Sentry Release
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create Sentry release
        uses: getsentry/sentry-release-action@v3
        with:
          environment: production
          sentry_org: ${{ secrets.SENTRY_ORG }}
          sentry_project: ${{ secrets.SENTRY_PROJECT }}
          sentry_auth_token: ${{ secrets.SENTRY_AUTH_TOKEN }}
