name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: "11.2.2"
      - name: Remove pnpm.yaml build restrictions (CI only)
        run: rm -f pnpm.yaml
      - name: pnpm install (verbose)
        run: pnpm install --reporter=default 2>&1
      - run: pnpm turbo typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: "11.2.2"
      - name: Remove pnpm.yaml build restrictions (CI only)
        run: rm -f pnpm.yaml
      - name: pnpm install (verbose)
        run: pnpm install --reporter=default 2>&1
      - run: pnpm turbo lint
